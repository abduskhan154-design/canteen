<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canteen IIS | Multi-Device POS</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --maroon: #8a1538;
            --green: #10b981;
            --blue: #3b82f6;
            --bg: #f8fafc;
            --dark: #0f172a;
            --shadow: 0 8px 25px rgba(0,0,0,.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        body { background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* FIXED LOGIN SCREEN */
        #login-screen {
            position: fixed; inset: 0;
            background: linear-gradient(135deg, #8a1538, #5d1026);
            display: flex; justify-content: center; align-items: center; z-index: 2000;
            padding: 20px;
            transition: opacity 0.3s ease;
        }
        .login-box { 
            background: white; padding: 35px; width: 100%; max-width: 360px; 
            border-radius: 18px; box-shadow: var(--shadow); text-align: center; 
        }
        .login-box h2 { color: var(--maroon); margin-bottom: 5px; }
        .login-box input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; outline: none; }
        .login-box input:focus { border-color: var(--maroon); }

        /* APP CONTENT */
        #app-content { display: none; flex-direction: column; height: 100vh; width: 100%; }

        /* NAV & DASHBOARD */
        nav { 
            background: white; padding: 10px 20px; display: flex; 
            justify-content: space-between; border-bottom: 1px solid #e2e8f0; align-items: center;
            flex-shrink: 0;
        }
        #owner-dashboard {
            display: none; background: var(--dark); color: white; padding: 15px 20px;
            justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;
        }

        .main-container { display: flex; flex: 1; overflow: hidden; }

        /* MENU SECTION */
        .menu { flex: 1; padding: 15px; overflow-y: auto; background: var(--bg); }
        .search { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 15px; font-size: 16px; }
        
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); 
            gap: 12px; 
        }
        .item { 
            background: white; padding: 18px 10px; border-radius: 14px; 
            text-align: center; cursor: pointer; box-shadow: var(--shadow); 
            transition: .2s; border: 2px solid transparent;
        }
        .item:active { transform: scale(0.95); }

        /* BILLING SECTION */
        .billing { 
            width: 350px; background: white; display: flex; 
            flex-direction: column; border-left: 1px solid #e2e8f0; 
        }
        .header { background: var(--maroon); color: white; padding: 15px; text-align: center; }
        #cart { flex: 1; padding: 15px; overflow-y: auto; }
        .cart-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #ddd; align-items: center; }
        
        .qty-controls { display: flex; align-items: center; gap: 8px; margin-top: 5px; }
        .qty-controls button { width: 30px; height: 30px; border: none; border-radius: 6px; background: #e2e8f0; font-weight: bold; cursor: pointer; }

        .footer { padding: 15px; background: #f8fafc; border-top: 1px solid #e2e8f0; }
        .total-row { display: flex; justify-content: space-between; font-size: 1.4rem; font-weight: bold; margin-bottom: 10px; color: var(--maroon); }

        /* BUTTONS */
        .btn { border: none; cursor: pointer; border-radius: 10px; padding: 12px; font-weight: 700; transition: .2s; font-size: 15px; }
        .pay { background: var(--green); color: white; width: 100%; }
        .excel-btn { background: var(--blue); color: white; padding: 8px 15px; font-size: 13px; }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .main-container { flex-direction: column; }
            .billing { width: 100%; height: 45%; border-left: none; border-top: 2px solid #e2e8f0; }
            .grid { grid-template-columns: repeat(2, 1fr); }
            #owner-dashboard { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2>Canteen IIS</h2>
        <p style="margin-bottom: 15px; font-size: 14px; color: #64748b;">Sign in to access POS</p>
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password">
        <button class="btn pay" id="login-btn">LOGIN</button>
    </div>
</div>

<div id="app-content">
    <div id="owner-dashboard">
        <div style="display: flex; gap: 20px;">
            <div><small>Today's Total</small><br><span id="total-revenue" style="font-weight:bold; color:var(--green)">0 QR</span></div>
            <div><small>Transactions</small><br><span id="sales-count" style="font-weight:bold">0</span></div>
        </div>
        <button class="btn excel-btn" id="export-trigger">EXPORT SALES</button>
    </div>

    <nav>
        <div style="font-size: 14px;">Staff: <b id="user-display"></b></div>
        <button id="logout-btn" style="background:#ef4444; color:white; border:none; padding: 6px 12px; border-radius: 6px; cursor:pointer;">Logout</button>
    </nav>

    <div class="main-container">
        <div class="menu">
            <input class="search" id="search" placeholder="Search menu items...">
            <div class="grid" id="menu-grid">
                <div class="item" onclick="addItem('Karak Tea',2)"><h4>Karak</h4><p>2 QR</p></div>
                <div class="item" onclick="addItem('Samosa',3)"><h4>Samosa</h4><p>3 QR</p></div>
                <div class="item" onclick="addItem('Burger',15)"><h4>Burger</h4><p>15 QR</p></div>
                <div class="item" onclick="addItem('Water',1)"><h4>Water</h4><p>1 QR</p></div>
                <div class="item" onclick="addItem('Juice',5)"><h4>Juice</h4><p>5 QR</p></div>
                <div class="item" onclick="addItem('Fruit Sandwich',10)"><h4>Fruit Sandwich</h4><p>10 QR</p></div>
            </div>
        </div>

        <div class="billing">
            <div class="header"><h3>Current Order</h3></div>
            <div id="cart"></div>
            <div class="footer">
                <div class="total-row"><span>Total</span><span id="total-val">0 QR</span></div>
                <button class="btn pay" id="pay-btn" onclick="checkout()">CONFIRM PAYMENT</button>
                <button class="btn" style="background:#94a3b8; color:white; width:100%; margin-top:8px;" onclick="clearCart()">RESET CART</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCcXB1xDv0xvK1MkPPTrOeSBzWEoL_2NwU",
        authDomain: "canteen-iis.firebaseapp.com",
        projectId: "canteen-iis",
        storageBucket: "canteen-iis.firebasestorage.app",
        messagingSenderId: "950327325785",
        appId: "1:950327325785:web:73be2951548da8b32eed48"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const salesCol = collection(db, "sales");

    const ownerEmail = "test1@gmail.com";
    let cart = [];
    let excelData = [];

    // --- LOGIN SYSTEM FIX ---
    document.getElementById("login-btn").onclick = async () => {
        const email = document.getElementById("email").value;
        const pass = document.getElementById("password").value;
        const btn = document.getElementById("login-btn");
        
        if(!email || !pass) return alert("Please enter both email and password.");
        
        btn.disabled = true;
        btn.innerText = "VERIFYING...";

        try {
            await signInWithEmailAndPassword(auth, email, pass);
        } catch (e) { 
            alert("Login Failed: Please check your email and password."); 
            btn.disabled = false;
            btn.innerText = "LOGIN";
        }
    };

    document.getElementById("logout-btn").onclick = () => {
        signOut(auth).then(() => {
            // Clean up UI on logout
            document.getElementById("owner-dashboard").style.display = "none";
            cart = [];
            renderCart();
        });
    };

    // FIXED: Listens to auth changes and toggles views correctly
    onAuthStateChanged(auth, (user) => {
        const loginScreen = document.getElementById("login-screen");
        const appContent = document.getElementById("app-content");
        const ownerDash = document.getElementById("owner-dashboard");

        if (user) {
            loginScreen.style.display = "none";
            appContent.style.display = "flex";
            document.getElementById("user-display").innerText = user.email.split('@')[0];
            
            // Re-check owner permissions
            if (user.email.toLowerCase() === ownerEmail.toLowerCase()) {
                ownerDash.style.display = "flex";
            } else {
                ownerDash.style.display = "none";
            }
            startSync();
        } else {
            loginScreen.style.display = "flex";
            appContent.style.display = "none";
            document.getElementById("login-btn").disabled = false;
            document.getElementById("login-btn").innerText = "LOGIN";
        }
    });

    // --- POS FUNCTIONALITY ---
    window.addItem = (name, price) => {
        let item = cart.find(i => i.name === name);
        if (item) item.qty++;
        else cart.push({ name, price, qty: 1 });
        renderCart();
    };

    window.changeQty = (name, amount) => {
        let item = cart.find(i => i.name === name);
        if (!item) return;
        item.qty += amount;
        if (item.qty <= 0) cart = cart.filter(i => i.name !== name);
        renderCart();
    };

    window.clearCart = () => { cart = []; renderCart(); };

    function renderCart() {
        let cartDiv = document.getElementById("cart");
        let total = 0;
        cartDiv.innerHTML = cart.map(item => {
            total += item.price * item.qty;
            return `
            <div class="cart-row">
                <div>
                    <b>${item.name}</b>
                    <div class="qty-controls">
                        <button onclick="changeQty('${item.name}',-1)">-</button>
                        <span>${item.qty}</span>
                        <button onclick="changeQty('${item.name}',1)">+</button>
                    </div>
                </div>
                <span>${item.price * item.qty} QR</span>
            </div>`;
        }).join("");
        document.getElementById("total-val").innerText = total + " QR";
    }

    window.checkout = async () => {
        if (cart.length === 0) return alert("Cart is empty!");
        const btn = document.getElementById("pay-btn");
        btn.disabled = true;
        btn.innerText = "SAVING...";

        try {
            await addDoc(salesCol, {
                items: cart,
                total: cart.reduce((sum, i) => sum + (i.price * i.qty), 0),
                timestamp: serverTimestamp(),
                staff: auth.currentUser.email,
                date: new Date().toLocaleDateString()
            });
            cart = []; 
            renderCart();
            alert("Payment Successful!");
        } catch (e) { alert("Error saving transaction."); }
        finally { btn.disabled = false; btn.innerText = "CONFIRM PAYMENT"; }
    };

    function startSync() {
        const q = query(salesCol, orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            let todayRevenue = 0;
            excelData = [];
            const todayStr = new Date().toLocaleDateString();

            snapshot.forEach(doc => {
                const data = doc.data();
                if (data.date === todayStr) todayRevenue += data.total;
                data.items.forEach(item => {
                    excelData.push({
                        "ID": doc.id.substring(0, 5),
                        "Date": data.date,
                        "Staff": data.staff,
                        "Item": item.name,
                        "Qty": item.qty,
                        "Total_QR": item.price * item.qty
                    });
                });
            });
            document.getElementById("total-revenue").innerText = todayRevenue + " QR";
            document.getElementById("sales-count").innerText = snapshot.size;
        });
    }

    document.getElementById("export-trigger").onclick = () => {
        if(excelData.length === 0) return alert("No data available to export.");
        const ws = XLSX.utils.json_to_sheet(excelData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Sales Report");
        XLSX.writeFile(wb, "IIS_Canteen_Report.xlsx");
    };

    document.getElementById("search").addEventListener("input", function() {
        const term = this.value.toLowerCase();
        document.querySelectorAll(".item").forEach(item => {
            item.style.display = item.innerText.toLowerCase().includes(term) ? "" : "none";
        });
    });
</script>
</body>
</html>
